data_source.enabled: true
workspace.enabled: true
explore.enabled: true

server.name: opensearch_dashboards
server.host: "0.0.0.0"
server.ssl.enabled: false

# LOCAL DEV ONLY — skips TLS certificate validation for the self-signed demo certs.
# In production replace with 'full' and set opensearch.ssl.certificateAuthorities
# to your CA certificate path.
opensearch.ssl.verificationMode: none

opensearch.requestHeadersAllowlist: ["securitytenant","Authorization"]
opensearch_security.multitenancy.enabled: true
opensearch_security.multitenancy.tenants.preferred: ["Private", "Global"]
opensearch_security.readonly_mode.roles: ["kibana_read_only"]
ml_commons_dashboards.enabled: true