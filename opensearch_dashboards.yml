server.name: opensearch_dashboards
server.host: "0.0.0.0"
server.ssl.enabled: false

opensearch.hosts:
  - "https://opensearch-node1:9200"
  - "https://opensearch-node2:9200"

opensearch.username: "${OPENSEARCH_USERNAME}"
opensearch.password: "${OPENSEARCH_PASSWORD}"

# LOCAL DEV ONLY
opensearch.ssl.verificationMode: none

opensearch.requestHeadersAllowlist:
  - authorization
  - securitytenant
  - security_tenant

opensearch_security.multitenancy.enabled: true
opensearch_security.multitenancy.tenants.preferred:
  - Private
  - Global
opensearch_security.readonly_mode.roles:
  - kibana_read_only

ml_commons_dashboards.enabled: true

# Disable these for local demo
data_source.enabled: false
workspace.enabled: false
explore.enabled: false